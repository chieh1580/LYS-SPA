<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYS SPA 美妍館｜專屬放鬆指南</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+TC:wght@300;400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #111010;
    --white: #FAF8F5;
    --gold: #C9A96E;
    --gold-light: #E8D5B0;
    --gold-dim: rgba(201,169,110,0.15);
    --warm-gray: #8A8178;
    --bubble-bot: #1A1917;
    --bubble-user: #2C2820;
    --text-main: #EDE8E0;
    --text-dim: #8A8178;
    --phone-w: 390px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0D0C0B;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif TC', serif;
    padding: 40px 16px;
  }

  /* ambient glow */
  body::before {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(201,169,110,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .brand-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    letter-spacing: 0.4em;
    font-size: 11px;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.8;
  }

  /* Phone shell */
  .phone {
    width: var(--phone-w);
    max-width: 100%;
    background: #161412;
    border-radius: 44px;
    border: 1px solid rgba(201,169,110,0.18);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.8),
      0 40px 80px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.04);
    overflow: hidden;
    position: relative;
  }

  /* Status bar */
  .status-bar {
    height: 44px;
    background: #111010;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    color: var(--text-main);
    font-weight: 400;
    letter-spacing: 0.02em;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons span { font-size: 13px; }

  /* LINE Header */
  .line-header {
    background: #111010;
    border-bottom: 1px solid rgba(201,169,110,0.1);
    padding: 10px 16px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2A2318, #3D3020);
    border: 1px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-main);
    letter-spacing: 0.05em;
  }
  .header-sub {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.08em;
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
  }
  .header-dot {
    width: 7px; height: 7px;
    background: #4CAF50;
    border-radius: 50%;
    margin-right: 4px;
    display: inline-block;
  }

  /* Chat area */
  .chat-area {
    height: 580px;
    overflow-y: auto;
    padding: 20px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: #111010;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.2); border-radius: 2px; }

  /* Messages */
  .msg-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .msg-row.visible { opacity: 1; transform: translateY(0); }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2A2318, #3D3020);
    border: 1px solid rgba(201,169,110,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    overflow: hidden;
    padding: 0;
  }
  .msg-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

  .bubble {
    max-width: 76%;
    padding: 11px 14px;
    border-radius: 18px;
    font-size: 13.5px;
    line-height: 1.75;
    color: var(--text-main);
    position: relative;
  }
  .bubble.bot {
    background: var(--bubble-bot);
    border: 1px solid rgba(201,169,110,0.12);
    border-bottom-left-radius: 4px;
  }
  .bubble.user {
    background: linear-gradient(135deg, #2C2415, #3A2E1A);
    border: 1px solid rgba(201,169,110,0.25);
    border-bottom-right-radius: 4px;
    color: var(--gold-light);
  }
  .bubble em {
    color: var(--gold);
    font-style: normal;
    font-weight: 400;
  }

  /* Typing indicator */
  .typing {
    display: flex; gap: 4px; align-items: center;
    padding: 12px 16px;
  }
  .typing span {
    width: 6px; height: 6px;
    background: var(--warm-gray);
    border-radius: 50%;
    animation: typingDot 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingDot {
    0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
    30% { opacity: 1; transform: scale(1); }
  }

  /* Options panel */
  .options-panel {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 2px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.35s ease 0.1s, transform 0.35s ease 0.1s;
  }
  .options-panel.visible { opacity: 1; transform: translateY(0); }

  .option-btn {
    background: rgba(201,169,110,0.07);
    border: 1px solid rgba(201,169,110,0.25);
    border-radius: 12px;
    padding: 11px 14px;
    color: var(--text-main);
    font-size: 13px;
    font-family: 'Noto Serif TC', serif;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    line-height: 1.5;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .option-btn:hover {
    background: rgba(201,169,110,0.15);
    border-color: rgba(201,169,110,0.5);
    color: var(--gold-light);
    transform: translateX(3px);
  }
  .option-btn:disabled {
    opacity: 0.35;
    cursor: default;
    transform: none;
  }
  .option-btn.selected {
    background: rgba(201,169,110,0.2);
    border-color: var(--gold);
    color: var(--gold-light);
  }
  .option-icon { font-size: 16px; flex-shrink: 0; }

  /* Start button */
  .start-btn {
    background: linear-gradient(135deg, #C9A96E, #B8924A);
    border: none;
    border-radius: 12px;
    padding: 13px 24px;
    color: #111010;
    font-size: 13.5px;
    font-family: 'Noto Serif TC', serif;
    cursor: pointer;
    font-weight: 400;
    letter-spacing: 0.05em;
    transition: all 0.2s ease;
    align-self: flex-start;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.35s ease, transform 0.35s ease, filter 0.2s ease;
  }
  .start-btn.visible { opacity: 1; transform: translateY(0); }
  .start-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .start-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

  /* Progress bar */
  .progress-bar {
    height: 2px;
    background: rgba(201,169,110,0.08);
    position: relative;
    margin: 0;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), #E8C97A);
    transition: width 0.6s ease;
    width: 0%;
  }

  /* Result card */
  .result-card {
    background: linear-gradient(160deg, #1C1710 0%, #141210 100%);
    border: 1px solid rgba(201,169,110,0.3);
    border-radius: 16px;
    padding: 18px;
    max-width: 82%;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .result-card.visible { opacity: 1; transform: translateY(0); }
  .result-divider {
    height: 1px;
    background: rgba(201,169,110,0.15);
    margin: 12px 0;
  }
  .teacher-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .teacher-badge {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--warm-gray);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .teacher-desc {
    font-size: 12.5px;
    color: var(--text-main);
    line-height: 1.8;
    opacity: 0.85;
  }
  .guarantee-text {
    font-size: 11.5px;
    color: var(--warm-gray);
    line-height: 1.75;
    border-left: 2px solid rgba(201,169,110,0.3);
    padding-left: 10px;
    font-style: italic;
  }

  /* Action buttons */
  .action-btn {
    display: block;
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Noto Serif TC', serif;
    letter-spacing: 0.05em;
    transition: all 0.2s ease;
    margin-top: 8px;
  }
  .action-btn.primary {
    background: linear-gradient(135deg, #C9A96E, #B8924A);
    color: #111010;
  }
  .action-btn.primary:hover { filter: brightness(1.1); }
  .action-btn.secondary {
    background: rgba(201,169,110,0.08);
    border: 1px solid rgba(201,169,110,0.25);
    color: var(--gold-light);
  }
  .action-btn.secondary:hover { background: rgba(201,169,110,0.15); }

  /* Reset */
  .reset-area {
    text-align: center;
    padding: 10px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .reset-area.visible { opacity: 1; }
  .reset-btn {
    background: none;
    border: none;
    color: var(--warm-gray);
    font-size: 11px;
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .reset-btn:hover { color: var(--gold); }

  /* Bottom bar */
  .bottom-bar {
    background: #111010;
    border-top: 1px solid rgba(201,169,110,0.08);
    padding: 10px 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .input-mock {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 9px 14px;
    font-size: 12px;
    color: var(--warm-gray);
    font-family: 'Noto Serif TC', serif;
  }
  .send-mock {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(201,169,110,0.15);
    border: none;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold);
    font-size: 14px;
  }

  /* Step counter */
  .step-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--warm-gray);
    text-align: center;
    padding: 6px 0 2px;
    text-transform: uppercase;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2A2318;
    border: 1px solid rgba(201,169,110,0.4);
    color: var(--gold-light);
    font-size: 13px;
    font-family: 'Noto Serif TC', serif;
    padding: 10px 20px;
    border-radius: 30px;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Rich Menu ─────────────────────────────────────────────── */
  .rich-menu {
    position: relative;
    flex-shrink: 0;
    width: 100%;
    border-top: 1px solid rgba(201,169,110,0.25);
    background: #F5F0E8;
  }
  .rich-menu-img {
    width: 100%;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
  .rich-menu-grid {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
  }
  .menu-item {
    cursor: pointer;
    position: relative;
    background: transparent;
    transition: background 0.15s ease;
  }
  .menu-item:hover { background: rgba(107,91,62,0.08); }
  .menu-item:active { background: rgba(107,91,62,0.18); }
  .menu-item.active-pulse::after {
    content:'';
    position:absolute;
    inset:0;
    background: rgba(201,169,110,0.25);
    animation: menuPulse 0.4s ease forwards;
  }
  @keyframes menuPulse {
    0%{opacity:1} 100%{opacity:0}
  }

  /* modal overlay */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet {
    background: #161412;
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 32px;
    width: 100%;
    max-width: 390px;
    transform: translateY(30px);
    transition: transform 0.35s ease;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px;
    background: rgba(201,169,110,0.3);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .modal-sub {
    font-size: 11px;
    color: var(--warm-gray);
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }
  .modal-body {
    font-size: 13px;
    color: var(--text-main);
    line-height: 1.85;
    opacity: 0.85;
  }
  .modal-divider { height:1px; background: rgba(201,169,110,0.12); margin: 14px 0; }
  .modal-btn {
    display: block; width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none; cursor: pointer;
    font-size: 13px;
    font-family: 'Noto Serif TC', serif;
    letter-spacing: 0.05em;
    transition: all 0.2s ease;
    margin-top: 8px;
  }
  .modal-btn.primary { background: linear-gradient(135deg, #C9A96E, #B8924A); color: #111010; }
  .modal-btn.primary:hover { filter: brightness(1.1); }
  .modal-btn.secondary {
    background: rgba(201,169,110,0.08);
    border: 1px solid rgba(201,169,110,0.25);
    color: var(--gold-light);
  }
  .modal-btn.secondary:hover { background: rgba(201,169,110,0.15); }
  .modal-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none;
    color: var(--warm-gray); font-size: 18px; cursor: pointer;
  }
  /* time slots */
  .time-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 12px 0; }
  .time-slot {
    background: rgba(201,169,110,0.07);
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 8px; padding: 8px 4px;
    text-align: center; cursor: pointer;
    font-size: 12px; color: var(--text-main);
    font-family: 'Montserrat', sans-serif;
    transition: all 0.15s;
  }
  .time-slot:hover { background: rgba(201,169,110,0.2); border-color: var(--gold); }
  .time-slot.selected { background: rgba(201,169,110,0.25); border-color: var(--gold); color: var(--gold-light); }
  /* faq items */
  .faq-item {
    background: rgba(201,169,110,0.05);
    border: 1px solid rgba(201,169,110,0.12);
    border-radius: 10px; padding: 12px 14px;
    margin-bottom: 8px; cursor: pointer;
    transition: background 0.15s;
  }
  .faq-item:hover { background: rgba(201,169,110,0.1); }
  .faq-q { font-size: 12.5px; color: var(--gold-light); margin-bottom: 0; font-weight: 400; }
  .faq-a { font-size: 12px; color: var(--warm-gray); margin-top: 8px; line-height: 1.75; display: none; }
  .faq-item.open .faq-a { display: block; }
  /* member card */
  .member-card {
    background: linear-gradient(135deg, #2A2318, #1C1710);
    border: 1px solid rgba(201,169,110,0.4);
    border-radius: 14px; padding: 18px;
    margin-bottom: 12px;
  }
  .member-points { font-family:'Cormorant Garamond',serif; font-size:32px; color:var(--gold); }
  .member-label { font-size:10px; color:var(--warm-gray); font-family:'Montserrat',sans-serif; letter-spacing:0.15em; text-transform:uppercase; }
  /* map embed */
  .map-mock {
    background: #1C1710;
    border: 1px solid rgba(201,169,110,0.15);
    border-radius: 10px;
    height: 130px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 12px;
    position: relative; overflow: hidden;
  }
  .map-mock::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(201,169,110,0.08) 0%, transparent 70%);
  }


  /* Treatment selector */
  .treatment-item {
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(201,169,110,0.06);
    border: 1px solid rgba(201,169,110,0.15);
    border-radius: 10px; padding: 11px 14px;
    margin-bottom: 8px; cursor: pointer;
    transition: all 0.15s ease;
  }
  .treatment-item:hover { background: rgba(201,169,110,0.13); border-color: rgba(201,169,110,0.4); }
  .treatment-item.selected { background: rgba(201,169,110,0.22); border-color: var(--gold); }
  .treatment-name { font-size: 13px; color: var(--text-main); }
  .treatment-pts { font-size: 12px; color: var(--gold); font-family: 'Montserrat', sans-serif; font-weight: 300; }

  /* History items */
  .history-item {
    background: rgba(201,169,110,0.05);
    border: 1px solid rgba(201,169,110,0.1);
    border-radius: 10px; padding: 12px 14px;
    margin-bottom: 10px;
  }
  .history-date { font-size: 10px; color: var(--warm-gray); font-family: 'Montserrat', sans-serif; letter-spacing: 0.08em; margin-bottom: 4px; }
  .history-name { font-size: 13.5px; color: var(--text-main); margin-bottom: 6px; }
  .history-meta { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .history-teacher { font-size: 11px; color: var(--gold); font-family: 'Montserrat', sans-serif; }
  .history-pts { font-size: 11px; color: var(--warm-gray); }
  .history-note { font-size: 11.5px; color: var(--warm-gray); font-style: italic; border-left: 2px solid rgba(201,169,110,0.25); padding-left: 8px; line-height: 1.6; }


  /* ── Calendar ── */
  .cal-section-label {
    font-size: 11px; color: var(--warm-gray);
    font-family: 'Montserrat', sans-serif; letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .cal-month-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px; color: var(--text-main); letter-spacing: 0.06em;
  }
  .cal-nav {
    background: none; border: 1px solid rgba(201,169,110,0.25);
    border-radius: 6px; color: var(--gold); font-size: 16px;
    width: 28px; height: 28px; cursor: pointer; line-height: 1;
    transition: all 0.15s;
  }
  .cal-nav:hover { background: rgba(201,169,110,0.12); border-color: var(--gold); }
  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7,1fr);
    margin-bottom: 4px;
  }
  .cal-weekdays span {
    text-align: center; font-size: 10px;
    color: var(--warm-gray); font-family: 'Montserrat', sans-serif;
    padding: 2px 0;
  }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7,1fr);
    gap: 3px; margin-bottom: 4px;
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 12px; border-radius: 50%; cursor: pointer;
    color: var(--text-main); font-family: 'Montserrat', sans-serif;
    transition: all 0.15s; border: 1px solid transparent;
  }

const chatArea = document.getElementById('chatArea');
const progressFill = document.getElementById('progressFill');
const stepLabel = document.getElementById('stepLabel');

let userCount = 0; // total completed users (for rotation)
let answers = {};
let isAnimating = false;

// ─── Helpers ───────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function scrollBottom() {
  setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 80);
}

function setProgress(pct, label) {
  progressFill.style.width = pct + '%';
  stepLabel.textContent = label;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function addTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `
    <div class="msg-avatar"><img src="${LYS_LOGO}" /></div>
    <div class="bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatArea.appendChild(row);
  await sleep(50);
  row.classList.add('visible');
  scrollBottom();
  return row;
}

async function removeTyping(row) {
  row.style.opacity = '0';
  await sleep(200);
  row.remove();
}

async function addBotMsg(html, delay = 900) {
  const typing = await addTyping();
  await sleep(delay);
  await removeTyping(typing);

  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `
    <div class="msg-avatar"><img src="${LYS_LOGO}" /></div>
    <div class="bubble bot">${html}</div>`;
  chatArea.appendChild(row);
  await sleep(50);
  row.classList.add('visible');
  scrollBottom();
  return row;
}

async function addUserMsg(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="bubble user">${text}</div>`;
  chatArea.appendChild(row);
  await sleep(50);
  row.classList.add('visible');
  scrollBottom();
}

function addOptions(opts, onSelect) {
  const panel = document.createElement('div');
  panel.className = 'options-panel';
  const indent = document.createElement('div');
  indent.style.paddingLeft = '36px';
  indent.className = 'options-panel';

  opts.forEach(({ icon, text, value }) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-icon">${icon}</span><span>${text}</span>`;
    btn.onclick = async () => {
      if (isAnimating) return;
      isAnimating = true;
      // disable all
      indent.querySelectorAll('.option-btn').forEach(b => { b.disabled = true; });
      btn.classList.add('selected');
      await sleep(200);
      indent.style.opacity = '0';
      await sleep(300);
      indent.remove();
      await addUserMsg(icon + ' ' + text);
      await onSelect(value, text);
      isAnimating = false;
    };
    indent.appendChild(btn);
  });

  chatArea.appendChild(indent);
  setTimeout(() => indent.classList.add('visible'), 80);
  scrollBottom();
  return indent;
}

function addStartBtn(label, onClick) {
  const indent = document.createElement('div');
  indent.style.paddingLeft = '36px';

  const btn = document.createElement('button');
  btn.className = 'start-btn';
  btn.textContent = label;
  btn.onclick = async () => {
    if (isAnimating) return;
    isAnimating = true;
    btn.disabled = true;
    indent.style.opacity = '0';
    await sleep(300);
    indent.remove();
    await onClick();
    isAnimating = false;
  };

  indent.appendChild(btn);
  chatArea.appendChild(indent);
  setTimeout(() => btn.classList.add('visible'), 100);
  scrollBottom();
}

// ─── Flow ──────────────────────────────────────────────────────────────────

async function startFlow() {
  chatArea.innerHTML = '';
  answers = {};
  setProgress(0, '開始你的專屬體驗');

  await sleep(300);
  await addBotMsg(`嗨～很高興你找到這裡 🌿`, 600);
  await addBotMsg(`很多人在踏進 LYS 之前，<br>都說自己「說不清楚哪裡不對勁，<br>只知道整個人很重、很緊、很累…」`, 1100);
  await addBotMsg(`我們想在你到來之前，<br>先好好了解一下你現在的狀態 🫶<br><br>花 1 分鐘回答 3 個小問題，<br>我們會為你找到最適合的老師——`, 1200);

  addStartBtn('▶ 開始我的專屬測驗', startQ1);
}

async function startQ1() {
  setProgress(15, '問題 1／3');
  await addBotMsg(`最近身體上，你最有感的是哪一種？<br><em>（選一個最貼近你的感受就好）</em>`, 900);

  addOptions([
    { icon: '😴', text: '睡不好、腦袋脹脹的、容易頭重', value: 'sleep' },
    { icon: '💆', text: '肩頸超緊、背部像背著石頭', value: 'neck' },
    { icon: '🌫️', text: '身體沉重、循環不順、感覺濕氣很重', value: 'qi' },
  ], async (val, text) => {
    answers.q1 = { val, text };
    setProgress(35, '問題 1／3 ✓');
    await sleep(400);
    await startQ2();
  });
}

async function startQ2() {
  setProgress(45, '問題 2／3');
  await addBotMsg(`了解了～那最近的生活節奏呢？<br><em>你比較像哪一種狀態？</em>`, 900);

  addOptions([
    { icon: '🔥', text: '一直在衝、停不下來、壓力很大', value: 'stress' },
    { icon: '🪫', text: '提不起勁、動力好像被掏空了', value: 'drain' },
    { icon: '😶', text: '說不上來，就是整個人渾渾噩噩的', value: 'haze' },
  ], async (val, text) => {

// ── Calendar Logic ────────────────────────────────────────────────────────────
let calYear, calMonth, selectedDate = null;

function initCal() {
  const now = new Date();
  calYear  = now.getFullYear();
  calMonth = now.getMonth();
  selectedDate = null;
  renderCal();
}

function calShift(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCal();
}

function renderCal() {
  const grid  = document.getElementById('calGrid');
  const label = document.getElementById('calMonthLabel');
  if (!grid || !label) return;

  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  label.textContent = calYear + ' · ' + monthNames[calMonth];

  const today    = new Date();
  const firstDay = new Date(calYear, calMonth, 1).getDay();  // 0=Sun
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = '';
  // empty cells before 1st
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day cal-empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(calYear, calMonth, d);
    const isPast   = date < new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const isClosed = date.getDay() === 0; // 週日休假（示範用，可調整）
    const isToday  = date.toDateString() === today.toDateString();
    const dateStr  = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const isSelected = selectedDate === dateStr;

    let cls = 'cal-day';
    if (isPast)    cls += ' cal-past';
    if (isClosed && !isPast) cls += ' cal-closed';
    if (isToday)   cls += ' today';
    if (isSelected) cls += ' selected';

    const handler = (!isPast && !isClosed)
      ? `onclick="selectCalDay('${dateStr}', this)"`
      : '';

    html += `<div class="${cls}" ${handler}>${d}</div>`;
  }
  grid.innerHTML = html;
  updateBookingSummary();
}

function selectCalDay(dateStr, el) {
  selectedDate = dateStr;
  document.querySelectorAll('.cal-day.selected').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  updateBookingSummary();
}

function selectTime(el) {
  document.querySelectorAll('.time-slot.selected').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  updateBookingSummary();
}

function updateBookingSummary() {
  const summary = document.getElementById('booking-summary');
  if (!summary) return;
  const timeEl = document.querySelector('.time-slot.selected');
  const time   = timeEl ? timeEl.textContent : null;
  if (selectedDate && time) {
    const [y, m, d] = selectedDate.split('-');
    const days = ['日','一','二','三','四','五','六'];
    const weekday = days[new Date(+y, +m-1, +d).getDay()];
    summary.innerHTML = `✦ ${y} / ${m} / ${d}（週${weekday}）· ${time}`;
  } else if (selectedDate) {
    const [y, m, d] = selectedDate.split('-');
    summary.innerHTML = `✦ ${y} / ${m} / ${d} · 請選擇時段`;
  } else if (time) {
    summary.innerHTML = `✦ ${time} · 請選擇日期`;
  } else {
    summary.innerHTML = '';
  }
}

  if (type === 'faq') return `

// ── AI 療程後關心對話模組 ──────────────────────────────────────────────────

let careMode = false;
let careHistory = [];
let careTeacher = '';

const CARE_SYSTEM_PROMPT = `你是 LYS SPA 美妍館的 AI 助理，代表懿珊老師的團隊（微雅老師、妤羚老師）在客人完成撥筋療程後第 3 天主動關心。

【口吻原則】
- 溫暖自然，像老朋友，不是客服機器人
- 繁體中文，符合 LINE 對話節奏，句子不要太長
- 偶爾一個 emoji 增加溫度，不要過多
- 絕對不說「感謝您的寶貴意見」等制式用語

【依客人說的內容回應】
- 身體還在痠痛 → 說明這是正常現象，給居家保養建議
- 效果很好 → 真誠感謝，自然引導下次預約
- 想再來 → 直接說可以幫她安排，問偏好時段
- 有不適或問題 → 認真回應，必要時請她聯繫我們
- 隨意聊天 → 自然聊，維持溫暖關係

【禁止事項】
- 不要一次問超過一個問題
- 不要說太長的段落
- 不要推銷感太重

【LYS 資訊（需要時提供）】
- 地址：桃園市中壢區志航街 217 號
- 電話：0916-660-07
- 營業：週一至週日 09:00–21:00`;

async function startCareMode(teacherName) {
  careMode = true;
  careTeacher = teacherName || getTeacherName();
  careHistory = [];
  chatArea.innerHTML = '';
  setProgress(100, '療程後第 3 天 · 關心訊息');
  await sleep(500);
  const openMsg = careTeacher + '這邊想關心一下你 🌿<br><br>上次的療程到現在剛好第三天了，身體的狀態還好嗎？';
  await addBotMsg(openMsg, 800);
  enableCareInput();
}

function enableCareInput() {
  const bar = document.querySelector('.bottom-bar');
  bar.innerHTML = `
    <input id="careInput" type="text" placeholder="跟我們說說你的感受..."
      style="flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(201,169,110,0.25);
             border-radius:20px;padding:9px 14px;font-size:13px;color:var(--text-main);
             font-family:'Noto Serif TC',serif;outline:none;"
      onkeydown="if(event.key==='Enter')sendCareMsg()" />
    <button onclick="sendCareMsg()" style="width:36px;height:36px;border-radius:50%;
      background:linear-gradient(135deg,#C9A96E,#B8924A);border:none;cursor:pointer;
      color:#111010;font-size:15px;flex-shrink:0;">➤</button>`;
  setTimeout(() => document.getElementById('careInput')?.focus(), 300);
}

async function sendCareMsg() {
  if (isAnimating) return;
  const input = document.getElementById('careInput');
  if (!input) return;
  const userText = input.value.trim();
  if (!userText) return;
  input.value = '';
  input.disabled = true;
  isAnimating = true;

  await addUserMsg(userText);
  careHistory.push({ role: 'user', content: userText });

  const reply = await callCareAI(careHistory);
  await addBotMsg(reply.replace(/\n/g, '<br>'), 900);
  careHistory.push({ role: 'assistant', content: reply });

  input.disabled = false;
  input.focus();
  isAnimating = false;

  if (/預約|安排|時段|下次|再來/.test(reply)) {
    setTimeout(showCareBookingHint, 600);
  }
}

async function callCareAI(history) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: CARE_SYSTEM_PROMPT,
        messages: history
      })
    });
    const data = await res.json();
    return data?.content?.[0]?.text || '不好意思，剛才訊號有點問題，可以再說一次嗎？😊';
  } catch(e) {
    return '不好意思，剛才訊號有點問題，可以再說一次嗎？😊';
  }
}

function showCareBookingHint() {
  const hint = document.createElement('div');
  hint.style.cssText = 'padding-left:36px;margin-top:6px;opacity:0;transition:opacity 0.4s;';
  hint.innerHTML = `<button onclick="openModal('booking')" style="
    background:linear-gradient(135deg,#C9A96E,#B8924A);border:none;border-radius:12px;
    padding:10px 18px;color:#111010;font-size:12.5px;font-family:'Noto Serif TC',serif;
    cursor:pointer;letter-spacing:0.05em;">📅 立刻預約下次療程</button>`;
  chatArea.appendChild(hint);
  setTimeout(() => hint.style.opacity = '1', 80);
  scrollBottom();
}
